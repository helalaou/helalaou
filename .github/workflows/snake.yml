name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}

          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github&color_snake=#ff64da&color_dots=#ebedf0,#f6c4ff,#dc8cff,#ad5cff,#7c3aed
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ff64da&color_dots=#161b22,#351747,#64237d,#a960ff,#ff64da

      - name: Publish contribution snake
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
